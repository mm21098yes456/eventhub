<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EventHub</title>

    <!-- BOOTSTRAP -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- SWEET ALERT -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CHART JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ANIMATE CSS -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <div class="d-flex justify-content-between align-items-center w-100">

                <span class="navbar-brand fw-bold">

                    🎉 EventHub

                </span>



                <div>

                    <button
                        id="modoOscuro"
                        class="btn btn-outline-light me-2"
                    >

                        🌙

                    </button>



                    <button
                        onclick="exportarPDF()"
                        class="btn btn-danger me-2"
                    >

                        📄 Exportar PDF

                    </button>



                    <button
                        onclick="cerrarSesion()"
                        class="btn btn-secondary"
                    >

                        🔒 Cerrar Sesión

                    </button>

                </div>

            </div>

        </div>

    </nav>



    <div class="container mt-5">

        <!-- TITULO -->
        <div class="text-center mb-5">

            <h1 class="fw-bold animate__animated animate__fadeInDown">

                Gestión de Eventos

            </h1>

            <p class="text-muted">

                Organiza y administra tus eventos

            </p>

        </div>



        <!-- DASHBOARD -->
        <div class="row mb-5">

            <div class="col-md-4">

                <div class="card dashboard-card shadow text-center p-4">

                    <h2 id="totalEventos">

                        0

                    </h2>

                    <p>

                        Total Eventos

                    </p>

                </div>

            </div>



            <div class="col-md-4">

                <div class="card dashboard-card shadow text-center p-4">

                    <h2 id="eventosProximos">

                        0

                    </h2>

                    <p>

                        Eventos Próximos

                    </p>

                </div>

            </div>



            <div class="col-md-4">

                <div class="card dashboard-card shadow text-center p-4">

                    <h2 id="eventosFinalizados">

                        0

                    </h2>

                    <p>

                        Eventos Finalizados

                    </p>

                </div>

            </div>

        </div>



        <!-- FORMULARIO -->
        <div class="card shadow p-4 mb-5">

            <h3 class="mb-4">

                Crear Evento

            </h3>



            <form id="eventoForm">

                <div class="mb-3">

                    <label for="nombre"class="form-label">

                        Nombre

                    </label>



                    <input
                        type="text"
                        id="nombre"
                        class="form-control"
                        required
                    >

                </div>



                <div class="mb-3">

                    <label for="fecha"class="form-label">

                        Fecha

                    </label>



                    <input
                        type="date"
                        id="fecha"
                        class="form-control"
                        required
                    >

                </div>



                <div class="mb-3">

                    <label for="lugar" class="form-label">

                        Lugar

                    </label>



                    <input
                        type="text"
                        id="lugar"
                        class="form-control"
                        required
                    >

                </div>



                <div class="mb-3">

                    <label for="categoria" class="form-label">

                        Categoría

                    </label>



                    <select
                        id="categoria"
                        class="form-select"
                    >

                        <option value="Conferencia">

                            📚 Conferencia

                        </option>

                        <option value="Concierto">

                            🎵 Concierto

                        </option>

                        <option value="Reunión">

                            👥 Reunión

                        </option>

                        <option value="Boda">

                            💍 Boda

                        </option>

                        <option value="Cumpleaños">

                            🎂 Cumpleaños

                        </option>

                        <option value="Festival">

                            🎉 Festival

                        </option>

                        <option value="Seminario">

                            🖥️ Seminario

                        </option>

                        <option value="Graduación">

                            🎓 Graduación

                        </option>

                        <option value="Deportivo">

                            ⚽ Evento Deportivo

                        </option>

                        <option value="Empresarial">

                            🏢 Empresarial

                        </option>

                        <option value="Tecnología">

                            💻 Tecnología

                        </option>

                        <option value="Networking">

                            🤝 Networking

                        </option>

                        <option value="Workshop">

                            🛠️ Workshop

                        </option>

                    </select>

                </div>



                <button class="btn btn-primary w-100">

                    Guardar Evento

                </button>

            </form>

        </div>



        <!-- BUSCADOR -->
        <div class="mb-4">

            <input
                type="text"
                id="busqueda"
                class="form-control"
                placeholder="Buscar evento..."
            >

        </div>



        <!-- FILTRO -->
        <div class="mb-4">

            <select
                id="filtroCategoria"
                class="form-select"
            >

                <option value="">

                    Todas las categorías

                </option>



                <option value="Conferencia">

                    📚 Conferencia

                </option>



                <option value="Concierto">

                    🎵 Concierto

                </option>



                <option value="Reunión">

                    👥 Reunión

                </option>



                <option value="Boda">

                    💍 Boda

                </option>



                <option value="Cumpleaños">

                    🎂 Cumpleaños

                </option>

            </select>

        </div>



        <!-- CLIMA -->
        <div
            id="clima"
            class="alert alert-info text-center mb-4"
        >

            🌤️ Cargando clima...

        </div>



        <!-- GRÁFICA -->
        <div class="card shadow p-4 mb-5">

            <h2 class="mb-4">

                📊 Estadísticas

            </h2>



            <div style="max-width: 500px; margin:auto;">

                <canvas id="graficoEventos"></canvas>

            </div>

        </div>



        <!-- EVENTOS -->
        <div id="listaEventos"></div>

    </div>



    <!-- MAIN JS -->
    <script type="module" src="js/main.js"></script>

</body>

</html>
